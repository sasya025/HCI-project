<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
</head>

<style>
body{
	margin: 0;
	padding: 0;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	font-family: 'Jost', sans-serif;
	background-image: url("https://naea.com/wp-content/uploads/2015/04/Event_Background4-1.jpg");
	background-size: cover;
}
.main{
	width: 350px;
	height: 500px;
	background: rgb(198, 192, 192);
	overflow: hidden;
	background: url("https://doc-08-2c-docs.googleusercontent.com/docs/securesc/68c90smiglihng9534mvqmq1946dmis5/fo0picsp1nhiucmc0l25s29respgpr4j/1631524275000/03522360960922298374/03522360960922298374/1Sx0jhdpEpnNIydS4rnN4kHSJtU1EyWka?e=view&authuser=0") no-repeat center/ cover;
	border-radius: 10px;
	box-shadow: 5px 20px 50px #000;
}
#chk{
	display: none;
}
.signup{
	position: relative;
	width:100%;
	height: 100%;
}
label{
	color: #fff;
	font-size: 2.3em;
	justify-content: center;
	display: flex;
	margin: 50px;
	font-weight: bold;
	cursor: pointer;
	transition: .5s ease-in-out;
}
input{
	width: 60%;
	height: 10px;
	background: #e0dede;
	justify-content: center;
	display: flex;
	margin: 20px auto;
	padding: 12px;
	border: none;
	outline: none;
	border-radius: 5px;
}
button{
	width: 60%;
	height: 40px;
	margin: 10px auto;
	display: block;
	color: #fff;
	background: #3b858a;
	font-size: 1em;
	font-weight: bold;
	margin-top: 30px;
	border: none;
	border-radius: 5px;
	cursor: pointer;
}
.login{
	height: 460px;
	background: #eee;
	border-radius: 60% / 10%;
	transform: translateY(-180px);
	transition: .8s ease-in-out;
}
.login label{
	color: #3b858a;
	transform: scale(.6);
}
#chk:checked ~ .signup{
	transform: translateY(-500px);
}
#chk:checked ~ .login{
	transform: translateY(-500px);
}
#chk:checked ~ .login label{
	transform: scale(1);	
}
#chk:checked ~ .signup label{
	transform: scale(.6);
}
</style>

<body>

<div class="main">
<input type="checkbox" id="chk" aria-hidden="true">

<!-- SIGNUP -->
<div class="signup">
<form onsubmit="signup(event)">
<label for="chk">Sign up</label>
<input type="text" placeholder="User name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button type="submit">Sign up</button>
</form>
</div>

<!-- LOGIN -->
<div class="login">
<form onsubmit="login(event)">
<label for="chk">Login</label>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
</div>

</div>

<script>
function signup(event){
	event.preventDefault(); // stops auto redirect
	alert("Signin successful");
	window.location.href = "contact_project.html";
}

function login(event){
	event.preventDefault();
	alert("Login successful");
	window.location.href = "contact_project.html";
}
</script>

</body>
</html>
